spring:
  application:
    name: Bank_REST
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_db
    username: user
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/migration/db.changelog-master.xml
  logging:
    level:
      root: DEBUG

app:
  encryption:
    key: BankRestApp
  jwt:
    secret: BankRestAppJwtSecret
    expiration: 900000
    refresh-expiration: 604800000
